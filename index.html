      <p>உன் கண்கள் தான்.</p>
      <p>உன் கைகள் அவனை தொடற நொடி — உள்ள ஏதோ மாறுது. ஒரு பெயர். ஒரு முகம். உன் அம்மா. நீ எட்டு வயசு. கடற்கரை. ஒரு அலை. உன் தம்பி ரவி. நீ அவன் கையை விட்டுட்ட. மூணு நொடி. மூணு நொடியில அவன் போயிட்டான்.</p>
      <p>நீ அழுற. ஒன்பதாவது அழுகை. அல்லது நூறாவது. தெரியல.</p>
      <p>பெட்டி திறக்கற. இந்த தடவை உள்ள போன் இல்ல. ஒரு கண்ணாடி. நீ பார்க்கற. கண்ணாடியில் உன் முகம் இல்ல. ரவியோட முகம். எட்டு வயசு. நனைஞ்சு. பயப்பட்டு.</p>
      <p>"அண்ணா," ரவி சொல்றான். "வந்துட்டியா? இவ்ளோ நாள் ஆச்சே."</p>
      <p>"ஏன் வரல?"</p>
      <p>"நீ உன்னையே மன்னிக்கல. அதான். நான் காத்திருந்தேன், அண்ணா. ஒன்பது இரவு. ஒன்பது வாய்ப்பு. நீ ஒவ்வொரு தடவையும் வேற யாரையாவது குற்றம் சொல்ல முயற்சி பண்ணினே."</p>
      <p>"இந்த தடவை?"</p>
      <p>"இந்த தடவை நீ உன்னையே தாக்கினே. அதான் முதல் தடவையா நிஜம். அம்மா செஞ்ச கருவி பொய்யான பாதையை மட்டும் தான் தடுத்தது. சத்தியமான பாதை — இது."</p>
      <p>நீ கண்ணாடியில் கையை வைக்கற. ரவி அவன் கையை வைக்கறான். கண்ணாடி உருகுது.</p>
      <p>"வா அண்ணா. இவ்ளோ வருஷமா நான் தனியா இருந்தேன்."</p>
      <p>நீ உள்ள போற. கதவு மூடுது. போன், கடைசியா, அமைதியா இருக்கு.</p>
      <p>இரவு 2:47ல, ஒரு அம்மா — பல வருஷமா முதல் தடவை — நிம்மதியா தூங்குறா.</p>
    `
  }
};

const root = document.getElementById("passage");

function render(key) {
  const node = STORY[key];
  if (!node) return;

  const titleHtml = `<div class="passage-title">${node.title}</div>`;
  const bodyHtml = `<div class="passage-body">${node.body}</div>`;

  let tail = "";
  if (node.ending) {
    tail = `
      <div class="ending">
        <div class="label">END</div>
        <div>இந்த பாதை முடிஞ்சது. வேற ஒன்னு முயற்சி பண்ணணுமா?</div>
        <button data-action="restart">மீண்டும் ஆரம்பி</button>
      </div>
    `;
  } else if (node.choices) {
    const buttons = node.choices.map((c) =>
      `<button class="choice" data-to="${c.to}"><span class="arrow">➤</span>${c.text}</button>`
    ).join("");
    tail = `<div class="choices">${buttons}</div>`;
  }

  root.innerHTML = titleHtml + bodyHtml + tail;
  window.scrollTo({ top: 0, behavior: "smooth" });
  history.replaceState(null, "", "#" + key);
}

root.addEventListener("click", (e) => {
  const choice = e.target.closest(".choice");
  if (choice) {
    render(choice.dataset.to);
    return;
  }
  if (e.target.dataset.action === "restart") {
    render(STORY.start);
  }
});

document.getElementById("restart").addEventListener("click", () => render(STORY.start));

const fromHash = location.hash.replace("#", "");
render(STORY[fromHash] ? fromHash : STORY.start);
</script>
</body>
</html>
