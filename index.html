const STORY = {

  arrival: { title: "1 — மயிலாப்பூர்", choices: [{text:"தொடர்க.", to:"letter"}], body:`
<p>ஆனந்தி வீட்டின் வாசலில் நின்றாள், ஏழு ஆண்டுகளுக்குப் பிறகு.</p>
<p>இரண்டு நூற்றாண்டு பழமையான ஆலமரத்தின் நிழல் கூரையின் மீது விழுந்துகொண்டிருந்தது. வெள்ளை மலர்மாலைகள் வாசற்படியில் சருகாகிக் காற்றில் அலைந்தன. உள்ளே — அவளுடைய நினைவில் இருந்த அதே மணம். நெய் விளக்கு, பழைய புத்தகங்கள், சந்தனம், ஈரத் தரை.</p>
<p>தந்தை ராஜசேகரன், தென்னிந்தியப் புராதனக் கலைப் பொருள்களின் முதன்மை நிபுணர், இரண்டு நாட்களுக்கு முன்னர் இரவில் தம் படிப்பறையில் இறந்து கிடந்தார். கதவுகள் உள்ளிருந்து தாழிடப்பட்டிருந்தன. ஜன்னல்கள் மூடப்பட்டிருந்தன. மருத்துவர் "மாரடைப்பு, அறுபத்தாறு வயதில், ஆச்சரியமில்லை" என்று முடிவெழுதியிருந்தார். பால்ய காலப் பணியாள் அனுராதா தான் காலையில் காப்பித் தட்டுடன் சென்று கதவைத் தட்டினாள். கதவு திறக்கவில்லை. பின்னர் கதவை உடைத்தனர்.</p>
<p>ஆனந்தி கடைசியாக அப்பாவைப் பார்த்தபோது அவளுக்கு இருபத்தைந்து வயது. ஒரு கணவனைத் தேர்ந்தெடுத்தாள், அவர் மறுத்தார். ஏழு ஆண்டுகள், ஒரு வார்த்தை கூட இல்லை. அவளுக்கு இப்போது முப்பத்திரண்டு. நீதிமன்றத்துக்கான முதன்மை நீதிக் கணக்காளராக வேலை செய்கிறாள். வந்தாலும் ஒரு கதை, வராவிட்டாலும் ஒரு கதை.</p>
<p>"வந்துட்டீங்களா, அம்மா." அனுராதா வாசலுக்கு வந்தாள். ஐம்பத்திரண்டு வயதிலும் அவளுடைய கூந்தலில் ஒரு வெள்ளைமுடி இல்லை. "சாப்பிட்டுட்டுத் தூங்குங்க. நாளைக்கு காரியம் இருக்கு."</p>
<p>"படிப்பறை?"</p>
<p>"நாளைக்கு பாக்கலாம், அம்மா. இரவுல வேண்டாம்."</p>
<p>ஆனந்தி தலையசைத்தாள். ஒன்பது மணிக்குப் படுக்கைக்குச் சென்றாள். பன்னிரண்டு மணிக்குப் படுக்கையிலிருந்து எழுந்தாள். அனுராதாவின் அறையில் விளக்கு அணைந்திருந்தது. ஆனந்தி, மெதுவாக, படிப்பறையின் கதவைத் திறந்தாள்.</p>
`},
  letter: { title: "2 — கடிதம்", body: `
<p>படிப்பறை — அவள் சிறுவயதில் ஓடித் திரிந்து விளையாடிய அறை — இப்போது அவளுக்குப் புதிராகியிருந்தது. சுவர் முழுதும் புத்தக அலமாரிகள். கையடக்க அளவில் சோழர் காலத் தாமிரக் காசுகள் ஒரு கண்ணாடிப் பெட்டியில். மேசையின் மீது பழைய எழுதுகோல்கள், சில மை குப்பிகள், ஒரு கைப்பிடி உறை. வாசம்: உலர்ந்த மை, சந்தனம், காலம்.</p>
<p>அவள் மேசை முன்னால் உட்கார்ந்தாள். உறையின் மேலே — அவளுடைய பெயர், அப்பாவின் கையெழுத்தில். மெழுகுச் சீலை இன்னும் முற்றிலும் இறுகவில்லை. சில மணி நேரம் முன்னர்தான் இது எழுதப்பட்டிருக்கிறது.</p>
<p>அவள் கைகள் நடுங்க, உறையைத் திறந்தாள்.</p>
<blockquote>
<p>என் அன்புள்ள மகளே ஆனந்தி,</p>
<p>நீ இதை வாசிக்கும் தருணத்தில் நான் உயிரோடு இருக்க மாட்டேன். ஏழு ஆண்டுகள் முழுதும் நான் உன்னிடம் பேச எண்ணியிருந்தேன். வார்த்தைகள் என்னை விட்டு விலகிக்கொண்டே இருந்தன. இப்போது சமயம் இல்லை.</p>
<p>நான் ஒரு குற்றத்தைச் செய்தேன். ஆயிரத்துத் தொள்ளாயிரத்து எண்பத்தேழாம் ஆண்டில். மூவருடன். ஒருவன் என் சொந்தத் தம்பி — உன் சித்தப்பா — வாசுதேவன். மற்றொருவன் கோவிந்த், ஒரு நண்பன், அவன் தொண்ணூற்றி இரண்டில் புற்றுநோயில் மரித்தான். மூன்றாமவன் — ஜேக்கப் — அவன் எண்பத்தொன்பதில் இலங்கையில் கடலில் மூழ்கி இறந்துவிட்டதாக நாங்கள் நம்பினோம். கடந்த ஆறு மாதங்களாக அந்த நம்பிக்கை உடைபடுகிறது.</p>
<p>நாங்கள் ஒரு விக்கிரகத்தைத் திருடினோம். சேலம் சுந்தரேசர் கோயிலின் ஆயிரம் ஆண்டு பழமையான நடராசர் — பஞ்சலோகம், சோழர் காலத்தில் வடிக்கப்பட்டது, இலண்டன் அருங்காட்சியகத்தில் இருந்து திரும்பப் பெறப் போகும் வழியில் நாங்கள் அதைத் தடுத்தோம். அந்த இரவில் ஒரு கோயில் அர்ச்சகர் இறந்தார். அதை நான் செய்தேன். அதை மறைக்க நான் முயன்றேன், ஆனால் கோவிந்த் என்னைத் தடுத்தான். வாசுதேவன் சிரித்தான். ஜேக்கப் பணம் எண்ணிக்கொண்டிருந்தான்.</p>
<p>நான் விக்கிரகத்தை வைத்துக்கொண்டேன். அதைத் தீ வைத்து உருக்கிவிட்டதாக மற்றவர்களிடம் சொன்னேன். பணத்தைப் பகிர்ந்துகொண்டோம். நாற்பது ஆண்டுகள் இந்த வீட்டின் ஒரு மறைந்த அறையில் அதை வைத்திருக்கிறேன்.</p>
<p>வீட்டின் வரைபடத்தில் பதினைந்து அறைகள். நீ வளர்ந்த வீட்டில் — பதினான்கு. ஒன்று மறைந்திருக்கிறது. அதைக் கண்டுபிடி. உள்ளே ஒரு நாட்குறிப்பு இருக்கிறது — நாற்பது ஆண்டுகளின் என் கையெழுத்து. அதை வாசிக்காதே என்று கேட்க முடியாது. ஆனால் தயவுசெய்து, நான் உன் கண்களில் என்னவாக இருக்க வேண்டும் என்பதைத் தீர்மானித்த பின்னரே திற.</p>
<p>விக்கிரகத்தை யாருக்கும் கொடுக்காதே. காவல்துறை, அரசு, அருங்காட்சியகம் — ஒருவருக்கும் இல்லை. அதன் சொந்த ஊர் சேலம் சுந்தரேசர். அங்கே மட்டும் சேர். எப்படி சேர்ப்பது என்பதை நீயே கண்டறிய வேண்டும்.</p>
<p>அனுராதாவை நம்பு. அவளுக்கு எல்லாமே தெரியும். நாற்பது ஆண்டுகள், அவள் என்னைத் தாங்கி நிறுத்தினாள். ஸ்ரீகாந்தை — வாசுதேவனின் மகன் — நம்பாதே. அவன் தந்தையின் வழியில் வளர்ந்தவன், அதையும் கடந்தவன்.</p>
<p>வேறு யாரையும் நம்பாதே. குறிப்பாக, ஜேக்கப் என்ற பெயரோ, ஜோசப் என்ற பெயரோ உனக்குக் கேட்டால் — ஓடு. அல்லது நில். ஆனால் கண்திறந்திரு.</p>
<p>உன்னை என்றும் நேசித்தேன். மன்னிக்கச் சொல்ல என் வாய் இணங்கவில்லை. ஆனால் — நீ. நீ. நீ.</p>
<p>— அப்பா</p>
</blockquote>
<p>உறையின் அடியில் — ஒரு சாவி. பழுப்பு இரும்பு, கைப்பிடியில் ஒரு சிறிய மணி வடிவம். அவள் வீட்டில் பார்த்த எந்தப் பூட்டுக்கும் இது போலில்லை.</p>
<p>ஆனந்தி இரண்டு நிமிடம் அசையாமல் இருந்தாள். பின்னர் எழுந்தாள். அவளுக்கு மூன்று வழிகள் தெரிந்தன.</p>

  search: { title:"3 — மறைந்த வரைபடம்", choices:[{text:"தொடர்க.", to:"cellar"}], body:`
<p>ஆனந்தி தீர்மானித்தாள் — இரவை அலசி வீட்டை அறிவாள். அப்பாவின் வரைபடம் வேண்டும். அவளுக்குத் தெரியும் — அவர் எல்லாவற்றுக்கும் ஒரு வரைபடம் வைத்திருந்தார்.</p>
<p>மேசையை முழுவதும் ஆராய்ந்தாள். மேலே, கீழே, பக்கங்கள். ஒன்றும் இல்லை. மேசையின் கீழே மூன்று இழுவைப் பெட்டிகள் — மேற்புறமான இரண்டு திறந்தன, அவற்றில் வழக்கமான தாள்கள். கீழ்ப்புறமான இழுவையை இழுத்தாள். பாதியில் நின்றது. அதைக் கைப்பிடித்து வெளியில் முழுவதுமாக இழுத்தாள் — இழுவைக்கு ஒரு போலித் தளம். அதை அவளுடைய தாய் ஐம்பதாம் பிறந்தநாள் பரிசாக அப்பாவுக்குக் கொடுத்திருந்தது அவளுக்குத் தெரியாமலில்லை. போலித் தளத்தைத் தூக்கினாள்.</p>
<p>அதன் கீழே — ஒரு மடிக்கப்பட்ட தாள். வரைபடம், ஆனால் அவள் சிறுவயதில் பார்த்தது அல்ல.</p>
<p>இந்த வரைபடத்தில் — பதினைந்து அறைகள். பதினைந்தாவது அறை — ஒரு கீற்றுக் கதவின் வழியாக மட்டுமே — மது நிலவறையின் ஒரு சுவர் வழியாக. அந்த சுவர் ஒரு போலி.</p>
<p>ஆனந்திக்கு இடி தாக்கியது போலானது. மது நிலவறை. அப்பா மதுவே குடிப்பதில்லை, ஆனால் ஒரு பழமையான மது நிலவறை வீட்டில் இருந்தது — அதன் சாவி அவருடைய இடுப்புச் சங்கிலியில் தான் இருந்தது. அவள் அதை நேற்று மாலையில் அப்பாவின் மரண உடலிலிருந்து கழட்டிக் கொண்டு வந்திருந்தாள். அந்த சங்கிலி இப்போது அவளுடைய கழுத்தில். ஒரு துடிப்பு போல் அவளை நினைவூட்டியது.</p>
`},
  cellar: { title:"4 — மது நிலவறை", body:`
<p>மது நிலவறை சமையலறையின் பின்புறம் — ஒரு குறுகிய மரப்படிக்கட்டு. ஆனந்தி கைவிளக்கை எடுத்து இறங்கினாள். கீழே, குளிர். தரையில் கல். மூன்று சுவர்கள் — மது பீப்பாய்களும், ஒரு பழைய திராட்சை மது அலமாரியும். நான்காவது சுவர் — வெறுமை. அதில் ஒரு சிறிய ஓவியம் — சேலம் சுந்தரேசர் கோயிலின் கோபுரம், அப்பா இளம்வயதில் வரைந்தது. அவளுக்கு நினைவில் இருந்த அதே ஓவியம், அதே சட்டகம். ஓவியத்தைத் தொட்டாள். சுவர் அதைச் சுற்றி நகர்ந்தது.</p>
<p>சுவருக்குப் பின்னால் ஒரு கதவு. மணி வடிவ பூட்டு.</p>
<p>சாவியைப் பொருத்தினாள். சரியாகச் சேர்ந்தது.</p>
<p>ஆனந்தி தயங்கினாள். பேராசிரியர் ஐயாதுரை அடுத்த வீட்டில் வசிக்கிறார். அப்பாவின் முப்பது ஆண்டு நண்பர். ஓய்வு பெற்ற கல்வெட்டு வல்லுநர். அவரை எழுப்பினால் உதவுவார். ஆனால் — அப்பா "வேறு யாரையும் நம்பாதே" என்று எழுதியிருந்தார்.</p>
<p>இரவின் மணி கடிகாரத்தில் ஒரு மணி பத்து நிமிடம். வெளியே, ஆலமரத்தில் ஒரு கோட்டான். வீட்டுக்குள் — அமைதி.</p>
`, choices:[
{text:"கதவைத் திற. தனியாக நுழை. காலையாகுவதற்குள் முடிக்க வேண்டும்.", to:"enter"},
{text:"பேராசிரியர் ஐயாதுரையை அழை. தனியாக நுழைவது புத்திசாலித்தனம் இல்லை.", to:"iyaduraj"}
]},
  enter: { title:"5 — அறை, இரவில்", body:`
<p>ஆனந்தி கதவை மெதுவாகத் திறந்தாள். உள்ளே — மீண்டும் ஒரு குளிர். வேறு வகையில். தூப மணம். வெகு காலம் எரியாத விளக்கின் வாசம்.</p>
<p>சுவர் ஒட்டி ஒரு பீடம். பீடத்தின் மேல் — அவன். சோழர் காலத்து நடராசர். ஐந்தடி உயரம். ஆடும் தோற்றம். ஒரு கையில் டமருகம், மற்றொரு கையில் தீ, மூன்றாம் கை அபய முத்திரை, நான்காவது கை வெளியே நீட்டி நிற்கிறது. அவன் பாதம் — அபஸ்மாரன் என்னும் முயலகனைச் சிதைத்தபடி நிற்கிறது.</p>
<p>அவள் வாழ்நாளில் பார்த்த எந்தப் பொருளையும் விட அழகான பொருள். ஆயிரம் ஆண்டுகள் மறைவில். ஒரு குற்றத்தின் கனத்தைத் தாங்கி நின்றான்.</p>
<p>பீடத்தின் கீழே — ஒரு தோலால் கட்டப்பட்ட நாட்குறிப்பு. மிகத் தடிமன். ஆனந்தி அதை எடுக்க கீழே குனிந்தபோது —</p>
<p>காலடி. மேலே. மரப்படிக்கட்டில். ஒரு படி. இரண்டு. மூன்று.</p>
<p>யாரோ வந்துகொண்டிருக்கிறார்கள்.</p>
<p>ஆனந்தி தன் கையில் இருந்த கைபேசியை எடுத்து, அமைதி பயன்முறையில் வைத்தாள். வீடியோப் பதிவைத் துவக்கி, கைபேசியை பீடத்தின் பின்னால் ஒளித்து வைத்தாள். அவள் உடல் — ஒரு பெரிய தாமிரக் குப்பியின் பின்னால் ஒளிந்துகொண்டது. அந்தக் குப்பி உரல் அளவில். அதன் பக்கத்தில் ஒரு உலக்கை — பழைய சமையல் சாதனம், ஆனால் தாமிரம், கனமாக.</p>
<p>காலடி நேராக வந்துகொண்டிருந்தது.</p>
`, choices:[
{text:"ஒளிந்திரு. அவன் என்ன சொல்கிறான், என்ன செய்கிறான் என்பதைப் பார். ஆதாரம் சேமி.", to:"hide_end"},
{text:"போரிடு. உலக்கையை எடுத்து ஆச்சரியத்தின் மூலம் வெல்.", to:"fight_end"}
]},
  hide_end: { title:"முடிவு — உண்மை", ending:true, body:`
<p>காலடி அறைக்குள் நுழைந்தது. ஒரு நெடிய ஆண். ஐம்பதின் கடைசி வயது. ஒரு கையில் கைவிளக்கு, மற்றொரு கையில் ஒரு சிறிய துப்பாக்கி. தாடி நரைத்திருந்தது. அவன் முகம் — ஆனந்தியின் நினைவில் இருந்த பழைய புகைப்படத்தில் அப்பாவுடன் நின்ற நான்கு பேரில் ஒருவன். அதே நெற்றி, அதே மூக்கின் வளைவு. ஜேக்கப்.</p>
<p>அவன் விக்கிரகத்தைப் பார்த்து நின்றான். ஒரு கணம் — அவன் கண்களில் ஒரு வலி, கசப்பு போன்ற ஒன்று மிளிர்ந்தது. பின் அது போனது. அவன் நாட்குறிப்பைக் காணவில்லை — பீடத்தின் கீழே, ஆனந்தியின் காலடியில் இருந்தது.</p>
<p>"ராஜசேகரா," அவன் தனக்குத்தானே சொன்னான், சாதாரணமாக, ஒரு பழைய நண்பனிடம் பேசுவது போல. "நீ விக்கிரகத்தை வைத்திருந்தாய். நாற்பது ஆண்டுகள். உன்னை சந்தேகித்தேன், ஆனால் உறுதியாக நான் நினைக்கவில்லை. நாட்குறிப்பு எங்கே? உன் வாக்குமூலம் எங்கே?"</p>
<p>அவன் அறையை ஒரு வட்டமாக நடந்தான். ஆனந்தியின் மறைவின் சில அடி தூரத்தில். அவளுக்கு மூச்சு வரவில்லை. அவன் திரும்பினான். மீண்டும் விக்கிரகத்தைப் பார்த்தான்.</p>
<p>"உன் மரணத்தை நான் சாதித்தேன். அந்த இரவில் உன் கதவைத் தட்டினேன். நீ என்னை அறியவில்லை — ஜோசப் தாமஸ், ஒரு வாங்குபவன் — என்று சொன்னேன். நீ கதவைத் திறந்தாய். நான் உன் கையில் ஒரு பழைய துருப்பிடித்த திறப்பானை வைத்தேன். நீ அதை அடையாளம் கண்டாய் — எண்பத்தேழின் இரவில் கோயில் கதவைத் திறந்த திறப்பான். உன் இதயம் நின்றது. மருத்துவர் சந்தேகிக்கவில்லை. ஆனால் — நாட்குறிப்பு."</p>
<p>அவன் வரப்போகிறான், ஆனந்தி நினைத்தாள். பீடத்தின் கீழே பார்க்கப் போகிறான். பின் என்னைப் பார்ப்பான்.</p>
<p>ஆனால் ஜேக்கப் ஆழ்ந்து சுவாசித்து, அமைதியாகச் சொன்னான்: "நீ அதை வேறு எங்கேயோ வைத்திருக்கிறாய். வீடு முழுவதும் ஆராய வேண்டும். நாளை."</p>
<p>அவன் திரும்பினான். வெளியேறினான். கதவைச் சாற்றினான்.</p>
<p>ஆனந்தி உடனே எழவில்லை. பத்து நிமிடம், இருபது, முப்பது. பின்னரே. கைபேசியை எடுத்தாள். வீடியோ — மூன்று மணி நேர பதிவு. முகம், குரல், பேச்சு, முழு வாக்குமூலம்.</p>
<p>காலையில், அவள் ஆய்வாளர் வசந்தனிடம் சென்றாள். வீடியோ. நாட்குறிப்பு. விக்கிரகம். எல்லாமே.</p>
<p>ஜேக்கப் — உண்மைப் பெயர் ஜேக்கப் சாமுவேல், போலிப் பெயர் ஜோசப் தாமஸ், மும்பை ஆன்டிக் தரகர் அலுவலகத்திலிருந்து செயல்பட்டவன் — கைதானான். ஸ்ரீகாந்த், அப்பாவின் உண்மை அறியாமலே ஜேக்கப்பின் கீழ் சில மாதங்கள் வேலை செய்திருந்தான். மாற்றுச் சாட்சியாகப் போனான்.</p>
<p>சேலம் சுந்தரேசர் கோயிலில், ஒரு வெள்ளிக்கிழமை, அரசு அதிகாரிகள், செய்தியாளர்கள், கூட்டத்தின் முன்னால், நடராசர் தம் சொந்த இடத்திற்குத் திரும்பினார். ஆனந்தி அவ்வேதியின் முன் நின்றாள். தந்தையின் நாட்குறிப்பு — அதன் முழு உள்ளடக்கம் — அரசின் தொல்லியல் துறையிடம் கொடுக்கப்பட்டது. குடும்பப் பெயர் — ராஜசேகரன் என்ற பெயர் — பத்திரிகைகளில் கறுப்பு எழுத்தில் வந்தது.</p>
<p>ஆனந்திக்கு அது வலித்தது. ஆனால் அப்பாவின் கடைசி வரிகள் அவள் இதயத்தில் இருந்தன: <em>"நீ. நீ. நீ."</em></p>
<p>அவள் அவருக்கான மரியாதையை ஒரு பொய்யில் கட்டியெழுப்பவில்லை. உண்மையில் — மிகக் கடுமையான உண்மையில் — கட்டினாள்.</p>
`},
  fight_end: { title:"முடிவு — பாரம்பரியம்", ending:true, body:`
<p>காலடி அறைக்குள் நுழையும் தருணத்தில், ஆனந்தி உலக்கையை எடுத்துக்கொண்டாள்.</p>
<p>ஜேக்கப் கதவை உள்ளே நுழைந்தான், கைவிளக்கு முதலில். அதன் ஒளி அறையைத் தேடியது. ஆனால் ஆனந்தி காத்திருந்தாள். அவன் தலை அவள் முன்னே வந்தபோது, தன் முழுப் பலத்தோடு அதன் மீது அடித்தாள்.</p>
<p>துப்பாக்கி கீழே விழுந்தது. அவன் ஒரு குரலும் எழுப்பவில்லை. தாமிர உலக்கையும், அவன் கபாலமும் — ஒன்றுக்கொன்று மென்மையாக இல்லை.</p>
<p>இரவின் மணி இரண்டு. வீட்டில் அவளும், அவன் உடம்பும் மட்டுமே.</p>
<p>ஆனந்தி பத்து நிமிடம் அசையாமல் நின்றாள். அவளுடைய கையில் தாமிர உலக்கை, அவளுடைய கைகளில் அவன் ரத்தம், அவளுடைய காலடியில் அவன்.</p>
<p>பின்னர் அவள் சிந்திக்கத் தொடங்கினாள். அவள் ஒரு நீதிக் கணக்காளர். ஒரு குற்றத்தை மறைப்பது எப்படி என்பது — அந்தத் தொழிலின் இருண்ட பக்கம், அவள் அதை வழிபடவில்லை, ஆனால் தெரியும். ஒரு உடல். ஒரு குற்றக்களம். ஒரு நாட்குறிப்பு. ஒரு விக்கிரகம்.</p>
<p>இரண்டு மணி நேரம் கழித்து — ஜேக்கப்பின் உடம்பு வீட்டின் தோட்டத்தில், இரண்டு நூற்றாண்டுப் பழமையான ஆலமரத்தின் வேர்களின் கீழே. ஆனந்தியின் கைகள், சட்டை, தரை — ஒன்றும் மிஞ்சவில்லை. அவளுடைய கைபேசியில் இடச்சுட்டி அணைக்கப்பட்டிருந்தது. ஜேக்கப்பின் கார் — மூன்று கிலோமீட்டர் அப்பால் ஒரு தனிமைப்பட்ட சாலையில் கைவிடப்பட்டது.</p>
<p>காலையில் அவள் சாதாரணமாக எழுந்தாள். அனுராதாவுடன் காப்பி குடித்தாள். தந்தையின் இறுதிக் காரியங்களைத் தொடர்ந்தாள்.</p>
<p>இரண்டு மாதங்கள் கழித்து, ஒரு பெயரில்லாத பார்சல் சேலம் சுந்தரேசர் கோயிலின் தொல்லியல் துறை அலுவலகத்தை அடைந்தது. நிலையின்றி நிற்கும் சோழர் காலத் தாமிர நடராசர். ஒரு கையெழுத்தில்லாக் குறிப்பு: <em>"இது இங்கே சொந்தம்."</em></p>
<p>தொல்லியல் துறை விசாரணை செய்தது. ஆதாரம் இல்லை. செய்தியாளர்களுக்கு ஒரு புதிர். விக்கிரகம் கோயிலில் நிறுவப்பட்டது.</p>
<p>ஆனந்தி நாட்குறிப்பை ஒரு தீச்சட்டியில் எரித்தாள். தந்தையின் பெயர் சுத்தமாக இருந்தது.</p>
<p>சில இரவுகளில் — பல இரவுகளில் — அவள் கனவில் ஆலமரத்தைக் காண்கிறாள். அதன் வேர்களின் கீழே ஒரு நினைவு உறங்குகிறது, அவளுடைய தனிமையில் மட்டுமே. ஒரு தந்தை, ஒரு மகள், இரண்டுமே ஒரே குற்றத்தைப் பார்க்க வேண்டியதாயிற்று. வேறு வேறு வழிகளில். ஆனால் ஒரே நிறம்: ரத்தச் சிவப்பு.</p>
<p>அவளுடைய அப்பாவின் பாரம்பரியம் — அவள் தாங்கினாள். ஒரு வார்த்தை வெளியே வராமல்.</p>
`},
  iyaduraj: { title:"முடிவு — சங்கம்", ending:true, body:`
<p>ஆனந்தி கதவைச் சாத்திவிட்டுப் படிக்கட்டில் ஏறினாள். ஐயாதுரையின் வீடு அடுத்தது. இரவு ஒரு மணி. அவள் கதவைத் தட்டியதும், ஆச்சரியமின்றி அவர் திறந்தார் — பழைய ஆராய்ச்சியாளரின் தூக்கம் தாமாக மென்மையானது.</p>
<p>"ஆனந்தி. வா."</p>
<p>அவள் கடிதத்தைக் காட்டினாள். அவருடைய மூத்த கைகள் நடுங்கின. அவர் அதை இரண்டுமுறை வாசித்தார், பின் வாசிக்கவில்லை.</p>
<p>"உன் தந்தை எண்பத்தேழில் அதில் உடனிருந்தான் என்பதை நான் என் சந்தேகத்தில் ஒட்டியிருந்தேன்," அவர் மெதுவாகச் சொன்னார். "ஆனால் அவர் என்னிடம் சொல்லவில்லை. நான் கேட்கவில்லை. அப்படியே நாற்பது ஆண்டுகள்."</p>
<p>"இப்போது என்ன?"</p>
<p>ஐயாதுரை சில நேரம் அமைதியாக இருந்தார். பிறகு:</p>
<p>"புராதனக் கலைப் பொருள்களின் சங்கம் — உலக அளவில் — நாங்கள் ஒரு சிறிய கூட்டம், ஒன்றை அறிவோம். ஜோசப் தாமஸ் என்ற பெயர் சில காலமாகப் பேசப்படுகிறது. மும்பை. பாரிஸ். துபாய். அவன் ஒரு பழைய பேய். எவரும் அவன் முகத்தைப் பார்த்ததில்லை, இரண்டு மூன்று பேர் தவிர. ஆனால் அவனுடைய வாங்கல் ஒரு குறிப்பிட்ட வடிவம் — சோழர் காலத் தாமிரம், எண்பதுகளில் இந்தியாவை விட்டு வெளியேறிய பொருள்கள். அவன் தன் சொந்த ஆதாரத்தை மறைக்க, பிற கடத்தல் கூட்டங்களை வாங்கிக் கொள்கிறான்."</p>
<p>"நாம என்ன செய்வோம்?"</p>
<p>"காவல்துறை வேண்டாம். அவர்களுக்கு வழக்கு செய்ய ஆதாரம் போதாது. காத்திருக்க, அவன் காலத்தில் மறைந்துவிடுவான். இல்லை — நாம் சங்கத்துக்குள் செய்வோம். ஐரோப்பாவில் ஒரு பெயர் இருக்கிறது — மார்கோ ரோஸி. அவன் நெல்லூர் வழக்கில் என் கைப்படியாளர் ஆகியிருந்தான். அவனுக்கு ஜோசப்பின் மீது ஒரு பழிக்கணக்கு. நாம் ஜோசப்பின் இடத்தைக் காட்டினோம் என்றால் — ஜோசப் ஒரு பெயரில்லாமல் போய்விடுவான்."</p>
<p>"அதாவது — அவன் மறைந்துவிடுவான். கொலை."</p>
<p>"ஆம். அல்லது ஒரு கடற்கரையில் ஒரு உடம்பு. அல்லது ஒன்றும் கிடைக்காத, ஒரு பூஜ்ஜியம். உன் தந்தையின் பெயர் பத்திரிகையில் வராது. விக்கிரகம் — மார்கோ வழியாக சேலம் கோயிலுக்குச் செல்லும். ஆதாரமில்லாத ஒரு திரும்புதல். உன் வாழ்க்கை — அதன் வழியில் தொடரும்."</p>
<p>ஆனந்தி நெடுநேரம் அமைதியாக இருந்தாள். பின் கேட்டாள்: "என் அப்பாவின் நாட்குறிப்பு?"</p>
<p>"அதை நாம் எரிக்க வேண்டும். வாக்குமூலம் என்பது வாக்குமூலம், அது இருக்கும் வரை."</p>
<p>இரண்டு மாதங்கள் கழித்து — ஐரோப்பாவின் ஒரு செய்தித்தாளில், ஒரு குறுகிய அறிவிப்பு: ஒரு பெயரில்லாக் கடத்தலாளர் ஒரு போக்குவரத்து விபத்தில் இறந்தார். மூன்று மாதங்கள் கழித்து — சேலம் சுந்தரேசர் கோயில் வாசலில் ஒரு பெட்டி. ஒரு சிற்றாலயக் காவலன் காலையில் அதைக் கண்டான். உள்ளே — நடராசர். அரசின் தொல்லியல் துறையின் சான்றிதழ் — போலியானது, ஆனால் முழுமையானது — விக்கிரகம் ஐரோப்பியத் தனியார் சேகரிப்பிலிருந்து திரும்பப் பெறப்பட்டது என்று கூறியது.</p>
<p>ஐயாதுரை, மூன்று வருடங்களுக்குப் பின், மரித்தார். வயோதிகம். ஆனந்தி அவரது இறுதிச் சடங்கில் கண்ணீர் விட்டாள். அவள் சேலம் கோயிலுக்கு அவருடைய சாம்பலின் ஒரு பகுதியை எடுத்துச் சென்றாள். தனியாக, அதை நடராசர் முன்னால் ஒரு துண்டுச் சீலையில் வைத்துவிட்டுவந்தாள்.</p>
<p>சங்கம் — பாதுகாக்கப்பட்ட ஒரு சங்கம், ஆதாரமற்ற ஒரு சங்கம், எழுதப்படாத ஒரு சங்கம் — செய்த நீதி. சம்பிரதாய நீதி அல்ல, ஆனால் ஒரு வகை நீதி. ஆனந்தி அதை ஏற்றுக்கொண்டாள். அவளுடைய வாழ்நாள் முழுதும்.</p>
`},
  anuradha: { title:"3 — அனுராதா", choices:[{text:"தொடர்க.", to:"with_anuradha"}], body:`
<p>ஆனந்தி அனுராதாவின் அறையின் கதவைத் தட்டினாள். உள்ளே — விளக்கு எரிந்தது.</p>
<p>"வா, அம்மா."</p>
<p>அனுராதா தூக்கத்தில் இல்லை. நெய் விளக்குச் சுடர் தான் — அவள் அறையில் காத்திருந்திருக்கிறாள். ஆனந்தியின் கையில் கடிதம் இருந்ததைப் பார்த்து அவள் நெடுமூச்சு விட்டாள். அந்த மூச்சில் — நாற்பது ஆண்டுகளின் களைப்பு.</p>
<p>"எழுதி வைப்பார் என்று தான் நினைத்தேன்."</p>
<p>"உனக்கு எல்லாமே தெரியுமா?"</p>
<p>"உனக்கு எவ்வளவு தெரியும், அம்மா?"</p>
<p>ஆனந்தி கடிதத்தை அவள் முன்னால் வைத்தாள். அனுராதா அதை வாசிக்கவில்லை. ஏற்கனவே தெரிந்துகொண்டிருந்தாள் என்று அவள் முகம் சொல்லியது.</p>
<p>"வாசுதேவன், கோவிந்த், ஜேக்கப். எண்பத்தேழின் இரவு. சேலம் சுந்தரேசர் கோயில். ஒரு அர்ச்சகரின் மரணம். உன் தந்தை அதைச் செய்தார். அவருடைய கைகள், அவருடைய பாரம். நாற்பது ஆண்டுகள், அவர் அந்த நாட்குறிப்பை எழுதியதைப் பார்த்த ஒரே ஆள் — நான். அவர் எழுதியதை நான் வாசித்தேன். அவருக்குச் சாட்சியாக இருக்க வேண்டியது அதுதான். அவரால் அதைச் செய்து முடிக்க முடியவில்லை — விக்கிரகத்தை திருப்ப முடியவில்லை. தைரியம் இல்லை."</p>
<p>"ஜேக்கப் இறந்துவிட்டான் என்று அப்பா நம்பினார். ஆனால் — "</p>
<p>"ஆம். ஆறு மாதங்களுக்கு முன், ஒரு ஞாயிற்றுக்கிழமை, பாண்டிச்சேரி கடற்கரையில். உன் தந்தை ஒரு புராதனக் கலை வாங்கல் கூட்டத்தில் இருந்தார். அங்கே ஒரு ஐரோப்பிய வாங்குபவர் — நெடிய, தாடி, அறுபது வயது. உன் தந்தை அவருக்குப் பின் சில அடி நடந்தார். அவருடைய நடை — உன் சித்தப்பாவின் நடைக்கு ஒத்த ஒரு வகை, ஆனால் வேறு. அன்று இரவு வீட்டில் அவர் கைகள் நடுங்கத் தம் நாட்குறிப்பை எழுதினார். ஜோசப் தாமஸ் — ஜேக்கப் சாமுவேல். உன் தந்தைக்கு உறுதியில்லை. ஆனால் சந்தேகம் பெரிதாக வளர்ந்தது."</p>
<p>"இப்போது என்ன?"</p>
<p>அனுராதா எழுந்தாள். ஒரு பழைய சாவியை அவள் தலையணைக்கு அடியில் இருந்து எடுத்தாள். மணி வடிவ பூட்டுச் சாவி.</p>
<p>"உன் அப்பாவிடம் இரண்டு சாவிகள் இருந்தன. ஒன்று உனக்கு. ஒன்று எனக்கு. நான் அந்த அறையை இரண்டே முறை மட்டும் பார்த்திருக்கிறேன். உள்ளே — நடராசர். மற்றும் நாட்குறிப்பு. நான் உன்னோடு வருகிறேன். நாற்பது ஆண்டுகள் காத்திருந்தேன், அம்மா. என் முறை வந்துவிட்டது."</p>
`},
  with_anuradha: { title:"முடிவு — அமைதி", ending:true, body:`
<p>இருவரும் மது நிலவறைக்கு இறங்கினர். அனுராதா முன்னால். அவள் கைவிளக்கு உறுதியாக. சேலம் கோயில் ஓவியத்தை அவள் தொட்டாள். சுவர் நகர்ந்தது.</p>
<p>ஆனந்தி உள்ளே நுழைந்தாள். பீடம், நடராசர், நாட்குறிப்பு — எல்லாம் கடிதம் சொன்னது போல்.</p>
<p>அனுராதா நாட்குறிப்பை எடுத்தாள். தோள்களில் சுமந்தாள். ஆனந்தி நடராசரை இரண்டு கையாலும் எடுக்க முயன்றாள் — அதிக கனம், ஆனால் சாத்தியம். இருவரும் வெளியேறினார்கள். சுவரை மீண்டும் சாற்றினர்.</p>
<p>படிக்கட்டை ஏறும்போது — கீழே, கதவின் சத்தம். வீட்டின் முக்கிய கதவு திறக்கப்பட்டது.</p>
<p>அனுராதா நின்றாள். ஆனந்தியின் கையை இறுக்கினாள்.</p>
<p>"பின்வாயல். தோட்டத்து வழி. ஓடு. என் தம்பியின் வீடு பத்து தெருக்கள் தூரம், அவன் காரில் கிளம்பு. சேலம் ஐந்து மணி நேரம். நேரே கோபுரத்தில் அதை விடு. நான் இங்கே நிற்கிறேன்."</p>
<p>"அனுராதா — "</p>
<p>"நாற்பது ஆண்டுகள் காத்திருந்தேன், அம்மா. என் முறை."</p>
<p>ஆனந்தி அவளை இரண்டு கைகளால் தழுவினாள். ஒரு வினாடி. பின் ஓடினாள் — நடராசரை, நாட்குறிப்பை.</p>
<p>தோட்டத்தில், ஆலமரத்தின் கீழே — அனுராதாவின் தம்பியின் கார். ஆனந்தி நடராசரை பின்னிருக்கையில் வைத்தாள். நாட்குறிப்பை மடியில். கிளம்பினாள்.</p>
<p>வீட்டின் உள்ளிருந்து ஒரு சத்தம் — அவள் கேட்டாள். ஒரு துப்பாக்கி. ஆனந்தி நிறுத்தவில்லை.</p>
<p>சேலம் — காலை ஆறு மணி. பழைய கல் கோபுரம். விடியல் வெளிச்சம். அவள் காரை விட்டு இறங்கினாள். கோபுர வாயிலின் முன்னால், தாமிர நடராசரை வைத்தாள். ஒரு குறிப்பு: <em>"சுந்தரேசர் கோயிலுக்கு உரியது. ராஜசேகரன் என்ற பெயரில். அந்தப் பெயருக்கு உரிய பாரம்."</em></p>
<p>அவள் காத்திருந்தாள். கோயில் ஊழியர்கள் வந்தனர். அவர்கள் உருவத்தைப் பார்த்து, பின்னர் ஆனந்தியைப் பார்த்து, பின் தங்களுக்கே தெரியாமல், அவர்கள் வாழ்நாளில் கண்ட பெரிய அதிசயத்தைத் தொட்டார்கள்.</p>
<p>காவல்துறை வந்தது. செய்தியாளர்கள். தொல்லியல் ஆய்வாளர்கள். ஆனந்தி அவர்களுக்கு நாட்குறிப்பைக் கொடுத்தாள். தந்தையின் முழு வாக்குமூலம். அனுராதாவின் பெயர். அவளுடைய தியாகம். ஜேக்கப்பின் முழுக் கதை.</p>
<p>ஒரு மாதம் கழித்து, தந்தையின் ஆலமர வீட்டை — அந்தப் படிப்பறை, அந்தப் படிக்கட்டு, அந்த மது நிலவறை — ஆனந்தி விற்கவில்லை. அதை மாற்றினாள். ஒரு சிறிய அருங்காட்சியகமாக, அனுராதாவின் பெயரில். தென்னிந்தியப் புராதனக் கலைப் பொருள் கட்டணமற்ற காட்சிக்கூடம். அப்பா எழுதியது அதன் மையத்தில் — ஒரு கண்ணாடிப் பெட்டியில், திறந்த நாட்குறிப்பாக. அதை யாரும் வாசிக்கலாம். அதை யாரும் தெரிந்துகொள்ளலாம்.</p>
<p>ஜேக்கப்பின் உடம்பு அந்த இரவில் வீட்டில் கண்டுபிடிக்கப்பட்டது. அனுராதா அவனைச் சமையல்கத்திகொண்டு வீழ்த்தினாள், பின் தனது கையால் — அதன்பிறகு. அவள் ஒரு கடிதம் எழுதியிருந்தாள், ஆனந்திக்கு:</p>
<blockquote>
<p>அம்மா, என்னை மன்னிக்காதே. நான் வேண்டி இதை செய்தேன். நான் ஒரு கதையை அழித்து, அதன் முடிவை எழுத விரும்பினேன். உன் தந்தை — என் கணவன் இல்லை, ஆனால் என் வாழ்வு. அவருடைய மாறாத கடைசிப் பயணத்திற்கு நான் ஒரு துணை. சேலத்துக்குப் போய் மீண்டுவா. உன் தந்தைக்கு — என்னை — என்றும் ஞாபகம் கொள் என்பேன்.</p>
</blockquote>
<p>ஆனந்தி அக்கடிதத்தை, தந்தையின் நாட்குறிப்போடு, அருங்காட்சியகத்தில் வைத்தாள். அந்தச் சிறிய இடம் — ஒரு குற்றத்தின், ஒரு மீட்பின், ஒரு தியாகத்தின் கதை. ஆலமரத்தின் கீழே, ஒரு அமைதி.</p>
`},
  police: { title:"3 — காவல்நிலையம்", body:`
<p>ஆனந்தி இரவை விழித்திருந்தாள். ஐந்து மணிக்கு வீட்டிலிருந்து நடந்தாள். மயிலாப்பூர் காவல்நிலையம் — பழைய பிரிட்டிஷ் கட்டிடம். இரவுப் பணியாளர் — ஒரு இளம் ஆய்வாளர், கண்ணில் தூக்கம், மேசையில் சாயம்.</p>
<p>"ஆய்வாளர் வசந்தனைப் பார்க்க வேண்டும்," ஆனந்தி சொன்னாள்.</p>
<p>"அவர் ஆறு மணிக்குத்தான் வருவார், அம்மா."</p>
<p>"நான் காத்திருக்கிறேன்."</p>
<p>ஆய்வாளர் வசந்தன் — நாற்பத்தைந்து வயது. மிதமான உருவம். ஒரு பெரிய மீசை. கடுமையான கண்கள், ஆனால் களைப்பானவை. அவள் கடிதத்தைப் படித்தார். இரண்டுமுறை. ஒரு எழுதுகோலால் சில இடங்களைச் சுட்டினார்.</p>
<p>"இது ஒரு கதை, அம்மா. அதிகாரப்பூர்வமாக, இது ஒரு இறந்தவருடைய மனநிலை வெளிப்பாடு. ஒரு வழக்கைத் திறக்க — மருத்துவர் ஏற்கனவே மரணச் சான்று கொடுத்துவிட்டார். உள்நாட்டுக் குற்ற வழக்கைத் திறக்க, இதைத் தாண்டிய ஆதாரம் வேண்டும்."</p>
<p>"என்னிடம் சாவி இருக்கிறது."</p>
<p>"சாவி ஒரு திறப்பான். அது குற்றத்தின் ஆதாரம் இல்லை."</p>
<p>"வீட்டில் ஒரு மறைந்த அறை இருக்கிறது."</p>
<p>வசந்தன் தலை அசைத்தார். "வீட்டை சோதனை செய்ய, என்னிடம் ஒரு சட்ட உத்தரவு வேண்டும். ஒரு சட்ட உத்தரவைப் பெற, என்னிடம் சந்தேகாஸ்பத மரணம் வேண்டும். எனக்குப் புரிந்தது போல், நான் சந்தேகித்தாலும், என் மேலதிகாரிகள் ஏற்கமாட்டார்கள்."</p>
<p>"ஆய்வாளர் — "</p>
<p>"அம்மா, என்னை நம்புங்க. நான் இந்தக் கதையை உதறவில்லை. ஆனால் இதைக் கையில் எடுக்க — நான் ஒரு வழியில் வேலை செய்ய வேண்டும். உங்கள் கடிதத்தை என்னிடம் விட்டுவிடுங்கள். நான் நாளைக்குள் ஒரு உத்தரவைப் பெற முடியுமா என்று பார்க்கிறேன். மாலையில் வீட்டில் சந்திப்போம்."</p>
<p>ஆனந்தி தயங்கினாள். கடிதம் — அப்பாவின் கடைசி கையெழுத்து. ஆனால் சட்டத்தின் வழியில் தான் இது போக வேண்டும்.</p>
`, choices:[

  leave_letter: { title:"முடிவு — இருள்", ending:true, body:`
<p>ஆனந்தி கடிதத்தை வசந்தனிடம் கொடுத்தாள். அவர் அதை ஒரு கோப்புப் பெட்டியில் வைத்தார். அவளுக்கு ஒரு ரசீது கொடுத்தார். மாலை வரை வீட்டில் காத்திரு என்றார்.</p>
<p>ஆனந்தி வீட்டுக்குத் திரும்பினாள். மணி பத்து. அனுராதா தயாரித்த உணவைச் சாப்பிட்டாள். அதிக களைப்பினால் — இரவு முழுதும் தூக்கமின்மை — மதியம் ஒரு துயில்.</p>
<p>மாலை ஐந்து மணி. அவள் எழுந்தாள். வீட்டில் அமைதி. அனுராதா — அறையில் இல்லை. சமையலறையில் ஒரு குறிப்பு: <em>"அம்மா, மஞ்சள் வாங்கக் கடைக்குப் போய்வரேன், மாலை ஆறுக்கு திரும்புறேன்."</em></p>
<p>ஆனந்தி வசந்தனை அழைக்க முயன்றாள். கைபேசி எடுக்கவில்லை. காவல்நிலையம் — அவர் "வெளியில்" என்றனர். மீண்டும் அழைப்போம் என்றனர்.</p>
<p>ஆறு மணி. அனுராதா திரும்பவில்லை. ஏழு. ஏதோ தவறு.</p>
<p>ஆனந்தி கீழ்த்தளத்தில் இறங்கினாள். ஓவியத்தைத் தொட்டாள். சுவர் நகர்ந்தது. சாவியைப் பொருத்தினாள் — கதவு திறந்தது.</p>
<p>உள்ளே — காலி. பீடம் காலி. நாட்குறிப்பு இல்லை. யாரோ முன்பே வந்துவிட்டனர்.</p>
<p>அவள் திரும்பினாள். அவளுக்குப் பின்னால் — மது நிலவறையின் படிக்கட்டில் — காலடி.</p>
<p>ஒரு நெடிய ஆண். நரைத்த தாடி. ஐம்பதின் கடைசி வயது. கையில் ஒரு துப்பாக்கி.</p>
<p>"நீ ராஜசேகரனின் மகள்," அவன் சொன்னான், ஒரு புன்னகையோடு. "உன் தந்தைக்கு உன்னை அறிமுகப்படுத்த வாய்ப்பு கிடைக்கவில்லை. நான் அறிமுகமாகிறேன்."</p>
<p>ஆனந்தி அவன் கண்களைப் பார்த்தாள். அவளுக்குச் சந்தேகம் இல்லை: ஜேக்கப்.</p>
<p>"ஆய்வாளர் — "</p>
<p>"வசந்தன் ஒரு நல்ல மனிதன். ஆனால் அவன் கீழ் வேலை செய்யும் ஒரு இளம் ஆய்வாளன் — அவன் என் ஆள். ஆறு மாதம். உன் கடிதம் அவனிடம் வந்தது. அதை நான் வாசித்தேன். உன் தந்தையின் சாவியை — நான் இரண்டு மணி நேரம் முன்னால் எடுத்தேன். விக்கிரகத்தை வெளியேற்றினேன்."</p>
<p>"நீ ஏன் காத்திருக்கிறாய்?"</p>
<p>ஜேக்கப் சிரித்தான். "நாட்குறிப்பு. அதைப் பற்றி உன் கடிதத்தில் ஒரு சொல். அதை எடுத்தேன், ஆனால் — விக்கிரகம் இங்கே, நாட்குறிப்பு இங்கே. வேறு என்ன இருக்கிறது? ஒரு குறிப்பேடு? வேறு பெயர்கள்? உன் தந்தை எழுதியது நான் வாசித்துவிட்டேன், ஆனால் — உனக்கு வேறு ஒன்று கொடுத்திருக்கலாம்."</p>
<p>"எனக்கு ஒன்றும் தெரியாது. கடிதம் தான்."</p>
<p>"அப்படியா?"</p>
<p>அவன் ஒரு படி அவளை நோக்கி வந்தான். ஆனந்தி ஓட முயன்றாள். அவன் — கனத்த அனுபவத்துடன் — அவளைத் தடுத்தான். துப்பாக்கி. ஒரு வேட்டு. அதன் ஒலி கீழ்த்தளத்தின் கல் சுவர்களில் தாக்கி எதிரொலித்தது.</p>
<p>ஆனந்தியின் இதயம் ஒரு கடைசி தடவை அடித்தது. பின் அமைதி.</p>
<p>இரவு பத்து மணிக்கு, அனுராதா திரும்பினாள். மஞ்சள் கடைக்காரர் இரண்டு மணி நேரம் தாமதமாக வந்திருந்தார். அவள் வாசலில் வீடு பூட்டப்பட்டிருந்ததைக் கண்டாள். கீழே, படிக்கட்டின் கீழே — சத்தம் இல்லை.</p>
<p>ஜேக்கப் வீட்டை முழுவதும் ஆராய்ந்தான். ஆறு மணி நேரம். மற்றொரு வாக்குமூலத்தைக் கண்டுபிடிக்கவில்லை. அவன் வெளியேறினான்.</p>
<p>ஒரு வாரத்திற்குப் பின், காவல் சோதனை. மது நிலவறையில் ஒரு உடம்பு. மரணக் காரணம்: ஒரே துப்பாக்கி வேட்டு. குற்றவாளி அறியப்படவில்லை. பத்திரிகைக் கட்டுரை: ஒரு இளம் பெண் தந்தையின் மரணத்தின் இரண்டு நாட்களில் சந்தேகாஸ்பதமாக இறந்தாள்.</p>
<p>சேலம் சுந்தரேசர் கோயில் ஒன்றும் அறியவில்லை. நடராசர் அன்று இரவே ஒரு மர்ம வாகனத்தில் பாண்டிச்சேரியிலிருந்து கிளம்பினார். துபாய், லண்டன், ஒரு அப்படியான வாங்குபவர். அந்தச் சங்கிலியின் கடைசி ஆள் — அவருக்கு அதன் சொந்த ஊர் தெரியாது. அதன் மரியாதை — தெரியாது.</p>
<p>ஒரு இரகசியம், ஒரு இருளில் — அழியாமல் கிடக்கிறது. ஒரு பெண்ணின் கடைசி சொற்கள் சுவர்களில். கேட்டவர் யாருமில்லை.</p>
`},
  keep_letter: { title:"முடிவு — நீதி", ending:true, body:`
<p>"இல்லை, ஆய்வாளர். கடிதம் என்னிடம் இருக்கட்டும். நீங்கள் இப்போதே என்னோடு வீட்டுக்கு வாருங்கள். மனிதர்களுடன், ஆனால் சாதாரண உடையில். யாரும் அறியக் கூடாது."</p>
<p>வசந்தன் சில நிமிடம் அமைதியாக இருந்தார். பின் தலை அசைத்தார். "உன் தந்தையை நான் முப்பது ஆண்டுகள் அறிவேன். அவர் ஒரு பொய் சொல்லியதில்லை — என்னுடன். உனக்கு அவர் எழுதியது ஒரு பொய்யாக இருக்காது."</p>
<p>இரண்டு மணி நேரத்துக்குள் — மூவர் ஆய்வாளர்கள் வீட்டினுள். வெளியில் இரண்டு வாகனங்கள், கறுப்பு உடையில் ஐந்து காவலர்கள். ஆனந்தி வழக்கம் போல் வீட்டில் — அனுராதா சமைக்கிறாள். வசந்தன் படிப்பறையில் ஒரு சாய்வு நாற்காலியில். மற்றவர்கள் வீட்டின் வெவ்வேறு மறைவான இடங்களில்.</p>
<p>அவர்கள் காத்திருந்தனர்.</p>
<p>இரவு ஒன்பது மணி. பின்கதவில் — மென்மையான திறப்பு. ஒருவன் — பின்வாயலில் இருந்து — மது நிலவறையை நோக்கி.</p>
<p>வசந்தன் கைபேசியில் ஒரு குறிப்பு அனுப்பினார். கீழ்த்தளத்துக்கான மூன்று ஆய்வாளர்கள். மது நிலவறையின் வாயிலில் காத்திருந்தனர்.</p>
<p>ஜேக்கப் ஓவியத்தைத் தொட்டான். சுவர் நகர்ந்தது. அவன் சாவியைப் பொருத்தினான் — அப்பாவின் கையில் இருந்த சாவி, இரண்டாவது சாவி, அவன் ரகசியமாக எடுத்தது.</p>
<p>கதவு திறந்தது. ஒரு கைவிளக்கு — அவனுடையது அல்ல — அவன் முகத்தில். ஒரு குரல்: "ஜோசப் தாமஸ். அல்லது ஜேக்கப் சாமுவேல். நீ காவல் கைதியாகிறாய்."</p>
<p>அவன் ஒரு கணம் — இரண்டு கணம் — யோசித்தான். கைகள் தூக்கினான்.</p>
<p>காவல் ஆய்வாளர்கள் வீட்டை அதிகாரப்பூர்வமாகச் சோதனை செய்தனர். மது நிலவறை, மறைந்த அறை, விக்கிரகம், நாட்குறிப்பு. எல்லாமே ஆதாரப் பெட்டிகளில். ஒரு வழக்கு — நாற்பது ஆண்டு பழைய ஒரு கோயில் கொள்ளை, ஒரு கொலை, ஒரு புதிய கொலை. சாட்சிகள், ஆவணங்கள், ஆய்வுகள்.</p>
<p>ஒரு வருடம் கழித்து — நீதிமன்றத் தீர்ப்பு. ஜேக்கப் சாமுவேல், எண்பத்தேழின் கோயில் கொள்ளை, அர்ச்சகரின் கூட்டுக் கொலை, ராஜசேகரனைக் கொன்றது — மூன்றுக்கும் ஆயுள் தண்டனை. ஸ்ரீகாந்த், கூட்டாளியாகச் சில ஆண்டுகள். ராஜசேகரன், கோவிந்த், வாசுதேவன் — மூவரும் இறந்தவர்கள், ஆனால் அவர்களின் பெயர்கள் தீர்ப்பில். குடும்பத்துக்கு வசதி — இல்லை. பெயருக்குக் கனம் — மூழ்கியது.</p>
<p>சேலம் சுந்தரேசர் கோயிலில் — ஒரு பெரிய அதிகாரபூர்வ விழா. அரசு, செய்தியாளர், ஒரு நீதிமன்ற உத்தரவு. நடராசர், நாற்பது ஆண்டுகளுக்குப் பிறகு, தம் இடத்திற்கு. ஆனந்தி கூட்டத்தில் ஒரு சாமான்ய பெண்ணாக நின்றாள். அவள் தந்தையின் பெயர் கூட்டத்தில் ஒலித்தபோது அவள் கீழ் பார்த்தாள். யாரும் அவளை அடையாளம் காணவில்லை.</p>
<p>அவள் சேலத்தை விட்டு வெளியேறினாள். மீண்டும் சென்னை. வேலை, வாழ்க்கை. சில இரவுகளில், அவளுடைய தந்தை அவள் கனவில் வருவார். அவருக்கு என்ன சொல்வது என்று அவள் இன்னும் தீர்மானித்திருக்கவில்லை. ஆனால் அவள் ஒரு விஷயத்தைச் செய்திருந்தாள் — சட்டத்தின் வழியில். மறைப்பற்ற வழியில். ஐயம் உண்டு, பயம் இல்லை.</p>
<p>சாட்சிகள் இருக்கும், மறைப்புகள் இல்லாத, ஒரு ஒளியான நீதி.</p>
`}
};
const root = document.getElementById("passage");
function render(key) {
  const node = STORY[key]; if (!node) return;
  const titleHtml = `<div class="passage-title">${node.title}</div>`;
  const bodyHtml = `<div class="passage-body">${node.body}</div>`;
  let tail = "";
  if (node.ending) {
    tail = `<div class="ending"><div class="label">END</div><div>இந்தப் பாதை நிறைவடைந்தது. மற்றொரு வழியை முயற்சிக்க விரும்புகிறீர்களா?</div><button data-action="restart">மீண்டும் ஆரம்பி</button></div>`;
  } else if (node.choices) {
    const buttons = node.choices.map((c) => `<button class="choice" data-to="${c.to}"><span class="arrow">➤</span>${c.text}</button>`).join("");
    tail = `<div class="choices">${buttons}</div>`;
  }
  root.innerHTML = titleHtml + bodyHtml + tail;
  window.scrollTo({ top: 0, behavior: "smooth" });
  history.replaceState(null, "", "#" + key);
}
root.addEventListener("click", (e) => {
  const choice = e.target.closest(".choice");
  if (choice) { render(choice.dataset.to); return; }
  if (e.target.dataset.action === "restart") render(STORY.start);
});
document.getElementById("restart").addEventListener("click", () => render(STORY.start));
const fromHash = location.hash.replace("#", "");
render(STORY[fromHash] ? fromHash : STORY.start);
</script>
